name: Bug Report
description: Something is broken or not working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below so we can reproduce and fix it.

  - type: dropdown
    id: version
    attributes:
      label: Minecraft Version
      options:
        - "1.21.1 (NeoForge)"
        - "1.20.1 (Forge)"
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: FastPipes Version
      placeholder: "e.g. 1.3.0"
    validations:
      required: true

  - type: input
    id: loader-version
    attributes:
      label: Forge / NeoForge Version
      placeholder: "e.g. NeoForge 21.1.77 or Forge 47.3.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs what actually happened?
      placeholder: "When I place an item pipe next to a barrel, ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Place a basic item pipe
        2. Attach an extractor
        3. ...
    validations:
      required: true

  - type: textarea
    id: crash-log
    attributes:
      label: Crash Log / Error
      description: If there's a crash, paste the log here (or link to a paste site like https://mclo.gs)
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: other-mods
    attributes:
      label: Other Mods Installed
      description: List other mods that might be relevant (or say "none" if vanilla + FastPipes only)
      placeholder: "JEI 15.2.0.27, Jade 11.9.4, ..."
